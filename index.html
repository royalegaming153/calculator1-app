<!DOCTYPE html>
<html>
<head>
<title>Pro Calculator</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;

    background: radial-gradient(circle at top, #0f172a, #020617);
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
}

/* Floating glow animation background */
body::before {
    content: "";
    position: absolute;
    width: 300px;
    height: 300px;
    background: #3b82f6;
    filter: blur(120px);
    top: 10%;
    left: 20%;
    opacity: 0.3;
    animation: float 6s infinite alternate;
}

@keyframes float {
    from { transform: translateY(0px); }
    to { transform: translateY(40px); }
}

/* Main Card */
.container {
    width: 340px;
    padding: 25px;
    border-radius: 20px;

    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);

    box-shadow:
        0 25px 60px rgba(0,0,0,0.6),
        inset 0 1px 1px rgba(255,255,255,0.1);

    transform-style: preserve-3d;
    transition: 0.3s;
}

.container:hover {
    transform: rotateX(5deg) rotateY(-5deg);
}

/* Animated Logo */
.logo {
    font-size: 22px;
    font-weight: 700;
    text-align: center;
    color: #60a5fa;
    margin-bottom: 10px;
    letter-spacing: 1px;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 5px #3b82f6; }
    to { text-shadow: 0 0 20px #60a5fa; }
}

/* Calculator icon animation */
.icon {
    display: block;
    font-size: 28px;
    text-align: center;
    animation: spin 4s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* Inputs */
input, select {
    width: 100%;
    padding: 12px;
    margin: 8px 0;

    border: none;
    border-radius: 12px;
    outline: none;

    background: rgba(255,255,255,0.08);
    color: white;

    font-size: 14px;

    box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
}

input::placeholder {
    color: #94a3b8;
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;

    border: none;
    border-radius: 12px;

    font-weight: 600;
    font-size: 15px;

    color: white;
    cursor: pointer;

    background: linear-gradient(135deg, #3b82f6, #1d4ed8);

    box-shadow: 0 10px 25px rgba(59,130,246,0.4);

    transition: 0.2s;
}

button:hover {
    transform: scale(1.05);
}

button:active {
    transform: scale(0.95);
}

/* Result */
#result {
    margin-top: 10px;
    color: #93c5fd;
    font-size: 16px;
}

/* History */
#history {
    margin-top: 10px;
    max-height: 120px;
    overflow-y: auto;

    padding: 10px;
    border-radius: 12px;

    background: rgba(255,255,255,0.05);
    color: #cbd5e1;
    font-size: 13px;
}
</style>
</head>

<body>

<div class="container">

    <div class="icon">🧮</div>
    <div class="logo">PRO CALCULATOR</div>

    <input type="number" id="num1" placeholder="Enter first number">
    <input type="number" id="num2" placeholder="Enter second number">

    <select id="operation">
        <option value="add">Addition</option>
        <option value="subtract">Subtraction</option>
        <option value="multiply">Multiplication</option>
        <option value="divide">Division</option>
        <option value="power">Power</option>
        <option value="sqrt">Square Root</option>
    </select>

    <button onclick="calculate()">CALCULATE</button>

    <div id="result">Result: --</div>

    <div id="history"><b>History</b></div>
</div>

<script>
function calculate() {
    let a = parseFloat(document.getElementById("num1").value);
    let b = parseFloat(document.getElementById("num2").value);
    let op = document.getElementById("operation").value;

    let result = 0;
    let text = "";

    if (op === "add") {
        result = a + b;
        text = `${a} + ${b}`;
    }
    else if (op === "subtract") {
        result = a - b;
        text = `${a} - ${b}`;
    }
    else if (op === "multiply") {
        result = a * b;
        text = `${a} × ${b}`;
    }
    else if (op === "divide") {
        if (b == 0) return alert("Cannot divide by zero");
        result = a / b;
        text = `${a} ÷ ${b}`;
    }
    else if (op === "power") {
        result = Math.pow(a, b);
        text = `${a} ^ ${b}`;
    }
    else if (op === "sqrt") {
        if (a < 0) return alert("Invalid input");
        result = Math.sqrt(a);
        text = `√${a}`;
    }

    document.getElementById("result").innerHTML =
        "Result: <b>" + result + "</b>";

    let h = document.createElement("div");
    h.innerHTML = text + " = " + result;
    document.getElementById("history").appendChild(h);
}
</script>

</body>
</html>
